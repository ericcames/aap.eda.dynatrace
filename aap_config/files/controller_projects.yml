---
# Consumed by the infra.aap_configuration.controller_projects role.
# The DT-EDA Controller project syncs THIS repo so the DT-EDA - Notify JT can run
# playbooks/notify_problem.yml. Public GitHub repo → no SCM credential needed.
controller_projects:
  - name: "{{ project_name }}"
    description: "Dynatrace → AAP EDA pull integration (rulebook + remediation playbooks)"
    organization: "{{ my_organization }}"
    scm_type: git
    scm_url: "{{ dt_eda_scm_url }}"
    scm_branch: "{{ dt_eda_scm_branch }}"
    # No update-on-launch: the rulebook/playbooks are stable, so re-pulling git on
    # every Notify launch only adds latency. The project syncs on apply (wait:true)
    # and can be synced manually when the repo changes.
    scm_update_on_launch: false
    scm_clean: true
    wait: true
