---
# Consumed by the infra.aap_configuration.eda_projects role.
# Syncs this repo's rulebooks/ so the activation can run dynatrace_problems.yml.
# Public GitHub repo → no SCM credential. sync: true pulls the rulebook on apply.
# NOTE: the certified ansible.eda 2.5.0 `project` module has no scm_branch — EDA
# syncs the repo's DEFAULT branch (main), which is where the rulebook lives, so
# no branch field is needed here. (controller_projects, a different module, does
# take scm_branch.)
eda_projects:
  - name: "{{ eda_project_name }}"
    description: "Dynatrace pull rulebooks (dt_esa_api → notify/remediate)"
    url: "{{ dt_eda_scm_url }}"
    organization: "{{ my_organization }}"
    sync: true
