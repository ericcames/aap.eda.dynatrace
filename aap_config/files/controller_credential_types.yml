---
# Consumed by the infra.aap_configuration.controller_credential_types role.
# Custom CONTROLLER credential type that injects the Dynatrace API host + an
# events.ingest token as ENV VARS into a job's environment. This lets the
# GUI-launchable "DT-EDA - Raise Test Problem" JT run
# playbooks/raise_test_problem.yml (which reads DT_API_HOST / DT_API_EVENT_TOKEN
# via ansible.builtin.env) without the operator sourcing docs/dev-environment.sh.
#
# Mirrors the EDA-side "DT-EDA - Dynatrace API" credential type, but:
#   - injects `env` (not `extra_vars`) — the playbook reads env vars
#   - carries a SEPARATE events.ingest-scoped token, distinct from the rulebook's
#     Read/Write-problems token (never mix the two scopes in one credential)
controller_credential_types:
  - name: "{{ cred_dt_events_ingest_type }}"
    kind: cloud
    description: "Injects Dynatrace API host + events.ingest token as env vars for raising synthetic problems"
    inputs:
      fields:
        - id: DT_API_HOST
          type: string
          label: Dynatrace API host
          help_text: "The live API host, e.g. https://<env-id>.live.dynatrace.com"
        - id: DT_API_EVENT_TOKEN
          type: string
          label: Dynatrace events.ingest token
          secret: true
          help_text: "Token with the Ingest events (events.ingest) scope — separate from the rulebook's Read/Write-problems token"
      required:
        - DT_API_HOST
        - DT_API_EVENT_TOKEN
    injectors:
      env:
        DT_API_HOST: !unsafe "{{ DT_API_HOST }}"
        DT_API_EVENT_TOKEN: !unsafe "{{ DT_API_EVENT_TOKEN }}"
