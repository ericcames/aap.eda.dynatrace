---
# Consumed by the infra.aap_configuration.eda_credential_types role.
# Custom EDA credential type that injects the Dynatrace API host + token into the
# rulebook as extra_vars, so rulebooks/dynatrace_problems.yml can reference
# {{ DT_API_HOST }} / {{ DT_API_TOKEN }} without secrets living in the rulebook.
eda_credential_types:
  - name: "{{ eda_dynatrace_credential_type }}"
    description: "Injects Dynatrace API host + token (Read/Write problems) into the rulebook"
    inputs:
      fields:
        - id: DT_API_HOST
          type: string
          label: Dynatrace API host
          help_text: "The live API host, e.g. https://<env-id>.live.dynatrace.com"
        - id: DT_API_TOKEN
          type: string
          label: Dynatrace API token
          secret: true
          help_text: "Token with Read problems + Write problems scopes"
      required:
        - DT_API_HOST
        - DT_API_TOKEN
    injectors:
      extra_vars:
        DT_API_HOST: !unsafe "{{ DT_API_HOST }}"
        DT_API_TOKEN: !unsafe "{{ DT_API_TOKEN }}"
