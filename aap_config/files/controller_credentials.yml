---
# Consumed by the infra.aap_configuration.controller_credentials role.
# Inputs come from env-var lookups in group_vars/all.yml — no secrets here.
#
# Only one Controller-side credential is needed for the notify-only demo: a
# Container Registry credential so Controller could pull the DE/EE from the
# internal PAH if needed. The DT-EDA - Notify JT itself runs on a stock EE and
# needs no credentials (it only debugs the event).
controller_credentials:
  - name: "{{ cred_hub_registry }}"
    organization: "{{ my_organization }}"
    credential_type: Container Registry
    inputs:
      host: "{{ hub_registry_host }}"
      username: "{{ hub_registry_username }}"
      password: "{{ hub_registry_password }}"
      verify_ssl: false
