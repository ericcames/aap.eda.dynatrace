---
# Consumed by the infra.aap_configuration.eda_credentials role.
# EDA has its OWN credential store (separate from controller_credentials).
# Inputs come from env-var lookups in group_vars/all.yml — no secrets here.
eda_credentials:
  # The Dynatrace API host + token, injected into the rulebook as extra_vars
  # (custom type defined in eda_credential_types.yml). Attached to the activation.
  - name: "{{ eda_dynatrace_credential }}"
    organization: "{{ my_organization }}"
    credential_type: "{{ eda_dynatrace_credential_type }}"
    inputs:
      DT_API_HOST: "{{ dt_api_host }}"
      DT_API_TOKEN: "{{ dt_api_token }}"

  # Lets the rulebook launch the Controller notify JT via run_job_template. The
  # activation references this so the rulebook authenticates to Controller without
  # an inline token.
  - name: "{{ eda_controller_credential }}"
    organization: "{{ my_organization }}"
    credential_type: "Red Hat Ansible Automation Platform"
    inputs:
      host: "{{ controller_cred_host }}/api/controller/"
      username: "{{ controller_cred_username }}"
      password: "{{ controller_cred_password }}"
      verify_ssl: false

  # Container Registry credential so EDA can pull the DT-EDA - DE image from the
  # internal Private Automation Hub registry (host = ah_hostname).
  - name: "{{ eda_hub_registry_credential }}"
    organization: "{{ my_organization }}"
    credential_type: "Container Registry"
    inputs:
      host: "{{ hub_registry_host }}"
      username: "{{ hub_registry_username }}"
      password: "{{ hub_registry_password }}"
      verify_ssl: false
