---
# Creates a Hub EE repository (dt_eda_de) that mirrors the DT-EDA DE image from
# quay.io, then syncs it so the image lives in Private Automation Hub by the time
# eda_decision_environments.yml registers it for EDA to pull.
#
# Getting the sync to actually run requires satisfying BOTH dispatch gates:
#   1. infra.aap_configuration.hub_ee_repository      — creates/updates the repo
#      (loops over `hub_ee_repositories` below).
#   2. infra.aap_configuration.hub_ee_repository_sync — syncs it. TWO gates:
#        a) DISPATCH GATE: dispatch only includes this role when a variable named
#           `hub_ee_repository_sync` is DEFINED (it ignores the value). That is
#           the sole purpose of the flag at the bottom of this file.
#        b) ROLE GATE: once included, the role loops over `hub_ee_repositories`
#           and only syncs items whose `sync` sub-option is true.
#      => `sync: true` / `wait: true` MUST live on the item AND
#         `hub_ee_repository_sync` MUST be defined. Both, or no sync happens.
#
# The `quay_io` remote registry (hub_ee_registries.yml) must exist first; dispatch
# runs hub_ee_registry before hub_ee_repository automatically.
#
# After sync the image is served by PAH at <ah_hostname>/dt_eda_de:<tag> — the
# default de_image (group_vars/all.yml) that EDA pulls via the DT-EDA - Hub
# Registry credential.
hub_ee_repositories:
  - name: "{{ hub_de_name }}"     # alphanumeric + underscores; becomes the Hub image name
    description: "DT-EDA Decision Environment — dt_esa_api source plugin (dynatrace.event_driven_ansible)"
    registry: quay_io             # must match hub_ee_registries[].name
    upstream_name: "{{ de_upstream_name }}"
    # Mirror the pinned IMMUTABLE version tag (the tag EDA pins to) plus `latest`
    # as a Hub-side smoke-test convenience. Templating off ee_version means a
    # version bump auto-includes the new tag here.
    include_tags:
      - latest
      - "{{ ee_version }}"
    # ROLE GATE: pull the image into Hub during bootstrap. `wait: true` blocks
    # until the sync completes before dispatch registers the DE.
    sync: true
    wait: true

# DISPATCH GATE: this flag's only job is to be DEFINED so dispatch includes the
# hub_ee_repository_sync role. The role ignores its value. Do not remove it.
hub_ee_repository_sync: true
