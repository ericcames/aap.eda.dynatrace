---
# ============================================================================
# aap.eda.dynatrace — AAP Configuration as Code entry point
# ============================================================================
# Canonical install path for every DT-EDA AAP object. Reads the data structures
# under files/ and applies them via the upstream infra.aap_configuration.dispatch
# role, then verifies the result. Idempotent — every object is keyed by name.
#
# AUTH — username/password basic auth (no token). The certified ansible.eda 2.5.0
#   modules used by infra.aap_configuration's EDA roles reject controller_token, so
#   we authenticate every call with AAP_CONTROLLER_USERNAME/PASSWORD. Nothing is
#   stored. See aap_config/README.md §Auth.
#
# Prerequisites:
#   - AAP reachable; AAP_CONTROLLER_USERNAME / AAP_CONTROLLER_PASSWORD exported
#   - DT_API_HOST / DT_API_TOKEN exported (see docs/dev-environment.sh)
#   - The DT-EDA DE image pushed to quay.io (see docs/decision-environment.md);
#     this play drives the PAH sync of it
#   - collections installed:  ansible-galaxy collection install -r ../collections/requirements.yml
#
# Run:
#   source docs/dev-environment.sh && \
#   ansible-playbook -i aap_config/inventory/ aap_config/load.yml
# ============================================================================

- name: Apply + validate aap.eda.dynatrace AAP configuration
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    cac_token_scope: write
  vars_files:
    - files/hub_ee_registries.yml
    - files/hub_ee_repositories.yml
    - files/controller_credential_types.yml
    - files/controller_credentials.yml
    - files/controller_projects.yml
    - files/controller_inventories.yml
    - files/controller_job_templates.yml
    - files/eda_credential_types.yml
    - files/eda_credentials.yml
    - files/eda_decision_environments.yml
    - files/eda_projects.yml
    - files/eda_rulebook_activations.yml
  tasks:
    # AUTH: username/password (basic auth), not a minted token. The certified
    # ansible.eda 1.x/2.5 modules used by infra.aap_configuration's EDA roles do
    # NOT accept controller_token — passing a token makes them fail with
    # "Unsupported parameters: controller_token". So we leave aap_token empty
    # (group_vars default) and authenticate every dispatch + validation call with
    # AAP_CONTROLLER_USERNAME / AAP_CONTROLLER_PASSWORD. Nothing is stored.
    - name: Apply all DT-EDA AAP objects
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch

    # WORKAROUND (certified ansible.eda 2.5.0): the decision_environment module
    # accepts a `credential` arg but silently does NOT attach it, so the DE has no
    # registry credential and the activation can't pull the image from PAH. Attach
    # it via the EDA API here, then restart the activation if it isn't healthy so
    # it retries the pull with the credential. Idempotent.
    - name: Attach the registry credential to the decision environment
      vars:
        eda_api: "{{ aap_hostname }}/api/eda/v1"
      block:
        - name: Look up the Hub Registry EDA credential id
          ansible.builtin.uri:
            url: "{{ eda_api }}/eda-credentials/?name={{ eda_hub_registry_credential | urlencode }}"
            method: GET
            url_username: "{{ aap_username }}"
            url_password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_validate_certs }}"
          register: dt_eda_hubcred

        - name: Look up the decision environment
          ansible.builtin.uri:
            url: "{{ eda_api }}/decision-environments/?name={{ eda_decision_environment | urlencode }}"
            method: GET
            url_username: "{{ aap_username }}"
            url_password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_validate_certs }}"
          register: dt_eda_de

        - name: Set DE + credential id facts
          ansible.builtin.set_fact:
            dt_eda_de_id: "{{ (dt_eda_de.json.results | selectattr('name', 'equalto', eda_decision_environment) | first).id }}"
            dt_eda_hubcred_id: "{{ (dt_eda_hubcred.json.results | selectattr('name', 'equalto', eda_hub_registry_credential) | first).id }}"

        - name: Attach the registry credential + set pull policy on the DE (PATCH)
          # The eda_decision_environments module exposes neither eda_credential nor
          # pull_policy, so set both via the API. pull_policy=missing is correct for
          # the immutable semver tag (pull once, reuse cache — no re-pull per run).
          ansible.builtin.uri:
            url: "{{ eda_api }}/decision-environments/{{ dt_eda_de_id }}/"
            method: PATCH
            url_username: "{{ aap_username }}"
            url_password: "{{ aap_password }}"
            force_basic_auth: true
            body_format: json
            body:
              eda_credential_id: "{{ dt_eda_hubcred_id | int }}"
              pull_policy: "{{ de_pull_policy | default('missing') }}"
            status_code: [200]
            validate_certs: "{{ aap_validate_certs }}"

        - name: Look up the rulebook activation
          ansible.builtin.uri:
            url: "{{ eda_api }}/activations/?name={{ eda_rulebook_activation_name | urlencode }}"
            method: GET
            url_username: "{{ aap_username }}"
            url_password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_validate_certs }}"
          register: dt_eda_act

        - name: Restart the activation if it is not running (so it retries the pull with the credential)
          ansible.builtin.uri:
            url: "{{ eda_api }}/activations/{{ (dt_eda_act.json.results | selectattr('name', 'equalto', eda_rulebook_activation_name) | first).id }}/restart/"
            method: POST
            url_username: "{{ aap_username }}"
            url_password: "{{ aap_password }}"
            force_basic_auth: true
            status_code: [204]
            validate_certs: "{{ aap_validate_certs }}"
          when: >-
            (dt_eda_act.json.results | selectattr('name', 'equalto', eda_rulebook_activation_name) | first).status
            not in ['running', 'starting']

    - name: Verify DT-EDA AAP objects exist
      ansible.builtin.import_tasks: validate_tasks.yml
