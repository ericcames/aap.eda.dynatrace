---
# ============================================================================
# DT-EDA CaC variables — connection, secrets (by reference), object names
# ============================================================================
# NO secrets in version control. Every sensitive value is resolved at runtime
# from an environment variable exported by docs/dev-environment.sh (gitignored).
# Committed files use placeholders only. Object names are namespaced `DT-EDA -`
# per ROADMAP so they co-exist safely in the shared Ansible Product Demos AAP.
# ============================================================================

# --- AAP API connection (consumed by infra.aap_configuration.dispatch) -------
# Auth is username/password (basic). aap_token is intentionally left EMPTY: the
# certified ansible.eda 2.5.0 modules reject controller_token, so a token breaks
# the EDA roles. Keeping aap_token '' makes every role use aap_username/password.
aap_hostname: "{{ lookup('ansible.builtin.env', 'AAP_HOSTNAME') }}"
aap_token: ""
aap_validate_certs: "{{ lookup('ansible.builtin.env', 'AAP_VALIDATE_CERTS') | default('false', true) | bool }}"
# Controller, EDA, and Hub (basic-auth ah_username/ah_password) roles all
# authenticate with these.
aap_username: "{{ lookup('ansible.builtin.env', 'AAP_CONTROLLER_USERNAME') | default('admin', true) }}"
aap_password: "{{ lookup('ansible.builtin.env', 'AAP_CONTROLLER_PASSWORD') }}"

# --- Organization -----------------------------------------------------------
# DT-EDA objects live here, namespaced `DT-EDA -`. Override with DT_EDA_ORG.
my_organization: "{{ lookup('ansible.builtin.env', 'DT_EDA_ORG') | default('IT Service Automation', true) }}"

# --- Private Automation Hub (container registry) -----------------------------
# For the AAP 2.5+ unified platform the Hub registry is at the same host as the
# gateway (no scheme). Override AH_HOSTNAME if Hub is on a separate host.
ah_hostname: "{{ lookup('ansible.builtin.env', 'AH_HOSTNAME') | default(aap_hostname | urlsplit('hostname'), true) }}"
ah_username: "{{ aap_username }}"
ah_password: "{{ aap_password }}"

# --- Decision environment (the dt_esa_api source plugin lives here) -----------
# Deliberate-update model (mirrors dc1.azure): the DE carries an IMMUTABLE semver
# tag (vMAJOR.MINOR.PATCH), never a floating `latest`, so a cached copy is never
# stale. Shipping an update is deliberate: build a new tag → push → PAH re-syncs
# → bump this string → re-apply load.yml. Bump rule:
#   CVE-only rebuild → patch (v1.0.1) · +collection → minor (v1.1.0) ·
#   new base image → major (v2.0.0). See docs/decision-environment.md.
ee_version: "{{ lookup('ansible.builtin.env', 'DT_EDA_DE_VERSION') | default('v1.0.0', true) }}"

# Hub-side image name (alphanumeric + underscores only) and the quay upstream.
hub_de_name: dt_eda_de
de_upstream_name: zigfreed/dt-eda-de

# DE image EDA pulls: defaults to the PAH copy at the pinned tag. PAH syncs it
# from quay.io (hub_ee_registries.yml / hub_ee_repositories.yml). Override
# DT_EDA_DE_IMAGE with the public quay.io URL for a Hub-less smoke test.
de_image: "{{ lookup('ansible.builtin.env', 'DT_EDA_DE_IMAGE') | default(ah_hostname ~ '/' ~ hub_de_name ~ ':' ~ ee_version, true) }}"
# DE pull policy. `missing` is correct for the immutable semver tag (pull once,
# reuse the cached layer — no ~900 MB re-pull every activation start). Set via the
# EDA API in load.yml (the eda_decision_environments module doesn't expose it).
# Choices: always | missing | never.
de_pull_policy: "{{ lookup('ansible.builtin.env', 'DT_EDA_DE_PULL_POLICY') | default('missing', true) }}"

# --- Dynatrace (pull source) -------------------------------------------------
# API host is the `live` host. Token needs Read + Write problems (poll +
# write-back). Both injected into the rulebook via the DT-EDA - Dynatrace API
# EDA credential — never inline in the rulebook.
dt_api_host: "{{ lookup('ansible.builtin.env', 'DT_API_HOST') }}"
dt_api_token: "{{ lookup('ansible.builtin.env', 'DT_API_TOKEN') }}"
# SEPARATE events.ingest-scoped token used ONLY to raise synthetic problems
# (playbooks/raise_test_problem.yml). Injected as an env var into the GUI-launched
# DT-EDA - Raise Test Problem JT via the DT-EDA - Dynatrace Events Ingest credential.
dt_api_event_token: "{{ lookup('ansible.builtin.env', 'DT_API_EVENT_TOKEN') }}"
# The rulebook condition matches OPEN problems whose title contains this string.
# Injected into the activation as an extra var so the match lives in CaC. The
# synthetic test problem (playbooks/raise_test_problem.yml) uses this exact title.
dt_match_title: "{{ lookup('ansible.builtin.env', 'DT_MATCH_TITLE') | default('DT-EDA Synthetic', true) }}"
# Poll interval (seconds) for the dt_esa_api source.
dt_poll_delay: "{{ lookup('ansible.builtin.env', 'DT_POLL_DELAY') | default('60', true) | int }}"

# --- Rulebook source (git) ---------------------------------------------------
# The demo syncs the rulebook from the public GitHub repo (no SCM credential).
# Customers swap this for their Bitbucket repo + an SCM credential.
dt_eda_scm_url: "{{ lookup('ansible.builtin.env', 'DT_EDA_SCM_URL') | default('https://github.com/ericcames/aap.eda.dynatrace.git', true) }}"
dt_eda_scm_branch: "{{ lookup('ansible.builtin.env', 'DT_EDA_SCM_BRANCH') | default('main', true) }}"

# --- AAP object names (namespaced `DT-EDA -` per ROADMAP) --------------------
# Controller-side
project_name: "DT-EDA"
inventory_name: "DT-EDA"
notify_template: "DT-EDA - Notify"
cred_hub_registry: "DT-EDA - Hub Registry"
# GUI trigger: JT + the custom credential type/credential that inject the
# events.ingest host + token as env vars for playbooks/raise_test_problem.yml.
raise_test_template: "DT-EDA - Raise Test Problem"
cred_dt_events_ingest: "DT-EDA - Dynatrace Events Ingest"
cred_dt_events_ingest_type: "DT-EDA - Dynatrace Events Ingest"
# EDA-side (EDA keeps its own credential/project stores, separate from controller_*)
eda_project_name: "DT-EDA"
eda_decision_environment: "DT-EDA - DE"
eda_dynatrace_credential: "DT-EDA - Dynatrace API"
eda_dynatrace_credential_type: "DT-EDA - Dynatrace API"
eda_controller_credential: "DT-EDA - Controller"
eda_hub_registry_credential: "DT-EDA - Hub Registry"
eda_rulebook_activation_name: "DT-EDA - Problem Remediation"

# Container-registry credential inputs (Controller + EDA pull the DE from PAH).
hub_registry_host: "{{ ah_hostname }}"
hub_registry_username: "{{ aap_username }}"
hub_registry_password: "{{ aap_password }}"

# Red Hat AAP credential inputs — lets the rulebook launch the notify JT.
controller_cred_host: "{{ aap_hostname }}"
controller_cred_username: "{{ aap_username }}"
controller_cred_password: "{{ aap_password }}"
