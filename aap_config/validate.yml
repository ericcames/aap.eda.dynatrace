---
# ============================================================================
# Standalone validation wrapper — confirms the DT-EDA AAP objects exist without
# re-running the apply. Authenticates with username/password (see load.yml §AUTH)
# and imports the shared validate_tasks.yml.
#
# Run:
#   source docs/dev-environment.sh && \
#   ansible-playbook -i aap_config/inventory/ aap_config/validate.yml
# ============================================================================

- name: Validate aap.eda.dynatrace AAP configuration
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    cac_token_scope: write
  vars_files:
    - files/hub_ee_repositories.yml
    - files/controller_credentials.yml
    - files/controller_projects.yml
    - files/controller_inventories.yml
    - files/controller_job_templates.yml
    - files/eda_credential_types.yml
    - files/eda_credentials.yml
    - files/eda_decision_environments.yml
    - files/eda_projects.yml
    - files/eda_rulebook_activations.yml
  tasks:
    # AUTH: username/password (basic auth) — see load.yml for why no token.
    - name: Verify DT-EDA AAP objects exist
      ansible.builtin.import_tasks: validate_tasks.yml
