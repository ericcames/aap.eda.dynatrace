---
# ============================================================================
# rulebooks/dynatrace_problems.yml — Dynatrace problems, PULL model (Phase 3)
# ============================================================================
# The dt_esa_api source polls the Dynatrace problems API over outbound HTTPS and
# emits an event per problem. On a matching OPEN problem this launches the
# NOTIFY-ONLY job template "DT-EDA - Notify" (debugs the event) — real
# remediation comes later (Phase 4+) behind a workflow approval node.
#
# Variables are injected by the rulebook activation
# (aap_config/files/eda_rulebook_activations.yml), so this file carries NO
# secrets and NO hard-coded match string:
#   DT_API_HOST / DT_API_TOKEN  ← DT-EDA - Dynatrace API EDA credential
#   dt_match_title / dt_poll_delay / notify_template / my_organization ← extra_vars
#
# EVENT SHAPE (verified 2026-06-04 against dt_esa_api 1.2.3 on a live problem):
# the event is FLAT. Confirmed fields used below — title, status, problemId,
# displayId, severityLevel, impactLevel, affectedEntities[], managementZones[],
# startTime/endTime. (`event.meta` is ansible-rulebook metadata, not Dynatrace.)
# To scope in production, tighten the condition on event.managementZones or
# event.severityLevel — and/or a Dynatrace management zone on the token.
# ============================================================================
- name: React to Dynatrace problems (pull)
  hosts: all
  sources:
    - dynatrace.event_driven_ansible.dt_esa_api:
        dt_api_host: "{{ DT_API_HOST }}"
        dt_api_token: "{{ DT_API_TOKEN }}"
        delay: "{{ dt_poll_delay | default(60) | int }}"
        # proxy: "{{ DT_PROXY }}"  # uncomment if OpenShift egress needs a proxy
  rules:
    - name: Notify on a matching open problem
      condition: event.status == "OPEN" and event.title is search(vars.dt_match_title)
      # Re-trigger guard: an OPEN problem is re-emitted on every poll with the SAME
      # event.problemId. Key the throttle on problemId (the canonical unique id) so
      # the notify JT fires once per problem per window, not every `delay` seconds.
      throttle:
        once_within: 10 minutes
        group_by_attributes:
          - event.problemId
      action:
        run_job_template:
          name: "{{ notify_template }}"
          organization: "{{ my_organization }}"
          job_args:
            extra_vars:
              dt_problem_id: "{{ event.problemId }}"
              dt_problem_display_id: "{{ event.displayId | default('') }}"
              dt_problem_title: "{{ event.title }}"
              dt_problem_status: "{{ event.status }}"
              dt_problem_severity: "{{ event.severityLevel | default('') }}"
              dt_problem_impact: "{{ event.impactLevel | default('') }}"
              dt_problem_affected: "{{ event.affectedEntities | default([]) }}"
              dt_problem_zones: "{{ event.managementZones | default([]) }}"
              dt_problem_event: "{{ event }}"
